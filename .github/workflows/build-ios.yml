name: Build iOS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify required secrets
        env:
          IOS_BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          IOS_P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
        run: |
          missing=()
          [ -z "$IOS_BUILD_CERTIFICATE_BASE64" ]  && missing+=("IOS_BUILD_CERTIFICATE_BASE64")
          [ -z "$IOS_P12_PASSWORD" ]              && missing+=("IOS_P12_PASSWORD")
          [ -z "$IOS_PROVISION_PROFILE_BASE64" ]  && missing+=("IOS_PROVISION_PROFILE_BASE64")
          [ -z "$IOS_KEYCHAIN_PASSWORD" ]         && missing+=("IOS_KEYCHAIN_PASSWORD")
          [ -z "$IOS_EXPORT_OPTIONS_PLIST" ]      && missing+=("IOS_EXPORT_OPTIONS_PLIST")
          [ -z "$ASC_API_KEY_BASE64" ]            && missing+=("ASC_API_KEY_BASE64")
          [ -z "$ASC_API_KEY_ID" ]                && missing+=("ASC_API_KEY_ID")
          [ -z "$ASC_ISSUER_ID" ]                 && missing+=("ASC_ISSUER_ID")
          [ -z "$ASC_APP_ID" ]                    && missing+=("ASC_APP_ID")

          if [ ${#missing[@]} -gt 0 ]; then
            echo "::error::The following required secrets are missing or empty:"
            for s in "${missing[@]}"; do
              echo "::error::  - $s"
            done
            echo "::error::See docs/ci-secrets.md for setup instructions."
            exit 1
          fi

          echo "All required secrets are present."

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "store_path=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.store_path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web assets and sync to iOS
        working-directory: artifacts/que-lo-que
        run: pnpm run cap:build:ios

      - name: Install Apple certificate and provisioning profile
        env:
          BUILD_CERTIFICATE_BASE64: ${{ secrets.IOS_BUILD_CERTIFICATE_BASE64 }}
          P12_PASSWORD: ${{ secrets.IOS_P12_PASSWORD }}
          BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
          PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

          echo "$BUILD_CERTIFICATE_BASE64" | base64 -D > "$CERTIFICATE_PATH"
          echo "$BUILD_PROVISION_PROFILE_BASE64" | base64 -D > "$PP_PATH"

          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          security import "$CERTIFICATE_PATH" -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp "$PP_PATH" ~/Library/MobileDevice/Provisioning\ Profiles

      - name: Build and export IPA
        working-directory: artifacts/que-lo-que/ios/App
        env:
          IOS_EXPORT_OPTIONS_PLIST: ${{ secrets.IOS_EXPORT_OPTIONS_PLIST }}
        run: |
          EXPORT_OPTIONS_PATH=$RUNNER_TEMP/ExportOptions.plist
          echo "$IOS_EXPORT_OPTIONS_PLIST" | base64 -D > "$EXPORT_OPTIONS_PATH"

          xcodebuild \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive

          xcodebuild \
            -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist "$EXPORT_OPTIONS_PATH" \
            -exportPath $RUNNER_TEMP/export

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: yapide-ios-${{ github.sha }}
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Extract IPA build metadata
        id: ipa_meta
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/export/*.ipa | head -n 1)
          unzip -p "$IPA_PATH" 'Payload/*.app/Info.plist' | \
            plutil -convert json -o /tmp/ipa_info.json -
          BUILD_NUMBER=$(python3 -c "import json; d=json.load(open('/tmp/ipa_info.json')); print(d['CFBundleVersion'])")
          APP_VERSION=$(python3 -c "import json; d=json.load(open('/tmp/ipa_info.json')); print(d['CFBundleShortVersionString'])")
          echo "build_number=$BUILD_NUMBER" >> $GITHUB_OUTPUT
          echo "app_version=$APP_VERSION"   >> $GITHUB_OUTPUT
          echo "IPA build number: $BUILD_NUMBER  version: $APP_VERSION"

      # Required secrets for the two steps below:
      #   ASC_API_KEY_BASE64 – base64-encoded App Store Connect .p8 private key
      #   ASC_API_KEY_ID     – key ID shown in App Store Connect → Users & Access → Keys
      #   ASC_ISSUER_ID      – issuer UUID shown on the same page
      #
      # Note: xcrun altool is used here for TestFlight uploads. Apple may
      # deprecate or change altool behavior as Xcode evolves. If uploads
      # become flaky, switch to `xcrun notarytool` or fastlane pilot as a
      # drop-in replacement without changing any secret values.
      - name: Write App Store Connect API key
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
        run: |
          mkdir -p ~/.private_keys
          echo "$ASC_API_KEY_BASE64" | base64 -D > ~/.private_keys/AuthKey_${ASC_API_KEY_ID}.p8

      - name: Submit IPA to TestFlight
        id: testflight_submit
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: |
          IPA_PATH=$(ls $RUNNER_TEMP/export/*.ipa | head -n 1)
          xcrun altool --upload-app \
            --type ios \
            --file "$IPA_PATH" \
            --apiKey "$ASC_API_KEY_ID" \
            --apiIssuer "$ASC_ISSUER_ID" \
            --verbose

      # Required secrets for this step:
      #   ASC_API_KEY_BASE64 – already used above for the altool upload
      #   ASC_API_KEY_ID     – already used above
      #   ASC_ISSUER_ID      – already used above
      #   ASC_APP_ID         – numeric app ID from App Store Connect → App Information
      - name: Update TestFlight what's new text
        if: steps.testflight_submit.outcome == 'success'
        env:
          ASC_API_KEY_BASE64: ${{ secrets.ASC_API_KEY_BASE64 }}
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          CHANGELOG_FILE: whatsnew/whatsnew-en-US
          IPA_BUILD_NUMBER: ${{ steps.ipa_meta.outputs.build_number }}
          IPA_APP_VERSION: ${{ steps.ipa_meta.outputs.app_version }}
        run: node scripts/set-testflight-whats-new.js

      # Required secret:
      #   SLACK_WEBHOOK_URL – Slack incoming webhook URL for the target channel.
      #     Create one at https://api.slack.com/messaging/webhooks and store it
      #     as a repository secret named SLACK_WEBHOOK_URL.
      - name: Notify Slack – submission succeeded
        if: steps.testflight_submit.outcome == 'success'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":white_check_mark: *iOS build submitted to TestFlight*\n• Branch: `${{ github.ref_name }}`\n• Commit: `${{ github.sha }}`\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }

      - name: Notify Slack – submission failed
        if: always() && steps.testflight_submit.outcome == 'failure'
        uses: slackapi/slack-github-action@v2.0.0
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": ":x: *iOS build failed to submit to TestFlight*\n• Branch: `${{ github.ref_name }}`\n• Commit: `${{ github.sha }}`\n• <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View run>"
            }

      - name: Clean up keychain and provisioning profile
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
          rm -f ~/Library/MobileDevice/Provisioning\ Profiles/build_pp.mobileprovision || true
          rm -f ~/.private_keys/AuthKey_*.p8 || true
